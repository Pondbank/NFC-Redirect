<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sorting Hat</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #d4af37; 
            font-family: 'Garamond', 'Georgia', serif; 
            text-align: center; 
            padding: 10% 5% 5% 5%; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; transition: color 0.5s; }
        #status { font-style: italic; font-size: 1.4rem; height: 3rem; margin-bottom: 20px; }
        
        /* The "Pop" Animation */
        .pop-container {
            animation: popIn 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            width: 100%;
        }
        
        .win-img { 
            width: 90%; 
            max-width: 450px; 
            border: 6px solid #ffd700; 
            border-radius: 15px; 
            box-shadow: 0 0 30px #ffd700;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px #ffd700; transform: scale(1); }
            50% { box-shadow: 0 0 50px #ff4500; transform: scale(1.03); }
            100% { box-shadow: 0 0 20px #ffd700; transform: scale(1); }
        }

        /* Loading Dots for Slytherin */
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); } 40% { color: #d4af37; } 60% { text-shadow: .25em 0 0 #d4af37; } 80%, 100% { text-shadow: .25em 0 0 #d4af37, .5em 0 0 #d4af37; } }
    </style>
</head>
<body>

    <h1 id="headerText">The Sorting Hat</h1>
    <div id="status">Ahem... stay still...</div>
    <div id="resultContainer"></div>

    <script>
        // --- CONFIGURATION ---
        const latitude = "51.5007"; // <--- UPDATE THIS
        const longitude = "-0.1246"; // <--- UPDATE THIS
        const winChance = 0.1; // 1 in 10 chance
        const trollURL = "https://www.youtube.com/watch?v=aPq3SEteEJc&list=RDaPq3SEteEJc&start_radio=1"; 

        const statusText = document.getElementById('status');
        const headerText = document.getElementById('headerText');
        const resultContainer = document.getElementById('resultContainer');

        const prompts = [
            "Difficult. Very difficult...",
            "Plenty of courage, I see...",
            "Not a bad mind either.",
            "Now, where to put you?",
            "Are you feeling lucky?",
            "DECIDING YOUR FATE..."
        ];

        let i = 0;
        function cyclePrompts() {
            if (i < prompts.length) {
                statusText.innerText = prompts[i];
                i++;
                setTimeout(cyclePrompts, 1600);
            } else {
                sortUser();
            }
        }

        function sortUser() {
            if (Math.random() < winChance) {
                // --- VICTORY: GRYFFINDOR ---
                headerText.innerText = "GRYFFINDOR!";
                headerText.style.color = "#ffd700";
                headerText.style.textShadow = "0 0 15px #740001";
                statusText.innerText = "WELL DONE, SEEKER!";
                
                resultContainer.innerHTML = `
                    <div class="pop-container">
                        <img src="download.jpeg" class="win-img">
                    </div>
                `;

                // Final redirect to Google Maps after 5 seconds
                setTimeout(() => {
                    window.location.replace(`https://google.com{latitude},${longitude}`);
                }, 3000);

            } else {
                // --- TROLL: SLYTHERIN ---
                headerText.innerText = "SLYTHERIN!";
                headerText.style.color = "#2a623d";
                statusText.innerHTML = 'Unlucky! You belong in the dungeons... <span class="loading-dots"></span>';
                
                setTimeout(() => {
                    window.location.replace(trollURL);
                }, 3000);
            }
        }

        // Run the script
        window.onload = cyclePrompts;
    </script>
</body>
</html>
