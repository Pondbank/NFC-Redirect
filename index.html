<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sorting Hat</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #d4af37; 
            font-family: 'Garamond', 'Georgia', serif; 
            text-align: center; 
            padding: 15% 5% 5% 5%; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        #status { font-style: italic; font-size: 1.4rem; height: 3rem; margin-bottom: 20px; }
        .win-gif { 
            width: 90%; 
            max-width: 450px; 
            border: 4px solid #d4af37; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); 
        }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #d4af37; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #d4af37, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #d4af37, .5em 0 0 #d4af37; } }
    </style>
</head>
<body>

    <h1 id="headerText">The Sorting Hat</h1>
    <div id="status">Ahem... stay still...</div>
    <div id="resultContainer"></div>

    <script>
        // --- CONFIGURATION ---
        const latitude = "51.5007"; // Replace with your final latitude
        const longitude = "-0.1246"; // Replace with your final longitude
        const winChance = 0.2; // 0.2 = 1 in 5 chance
        const trollURL = "https://youtube.com"; // Rickroll
        const winGIF = "https://giphy.com";

        const statusText = document.getElementById('status');
        const headerText = document.getElementById('headerText');
        const resultContainer = document.getElementById('resultContainer');

        const prompts = [
            "Difficult. Very difficult...",
            "Plenty of courage, I see...",
            "Now, where to put you?",
            "Are you feeling lucky?",
            "DECIDING YOUR FATE..."
        ];

        let i = 0;
        function cyclePrompts() {
            if (i < prompts.length) {
                statusText.innerText = prompts[i];
                i++;
                setTimeout(cyclePrompts, 1600);
            } else {
                sortUser();
            }
        }

        function sortUser() {
            if (Math.random() < winChance) {
                // VICTORY: GRYFFINDOR
                headerText.innerText = "GRYFFINDOR!";
                headerText.style.color = "#740001";
                statusText.innerText = "Well done, seeker... finding your path...";
                
                resultContainer.innerHTML = `<img src="${winGIF}" class="win-gif">`;

                // Redirect to Google Maps after showing the GIF for 4 seconds
                setTimeout(() => {
                    const mapsURL = `https://google.com{latitude},${longitude}`;
                    window.location.replace(mapsURL);
                }, 4500);
            } else {
                // TROLL: SLYTHERIN
                headerText.innerText = "SLYTHERIN!";
                headerText.style.color = "#1a472a";
                statusText.innerHTML = 'Unlucky! You belong in the dungeons... <span class="loading-dots"></span>';
                
                setTimeout(() => {
                    window.location.replace(trollURL);
                }, 2000);
            }
        }

        // Start the sequence when the page loads
        window.onload = cyclePrompts;
    </script>
</body>
</html>
